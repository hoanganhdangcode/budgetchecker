name: Deploy Backend VPS

on:
  push:
    branches:
      - main
    paths:
      - 'be/**'
      - 'infra/**'

jobs:
  migration:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: budgetdb
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Add migration if needed
        working-directory: be/budgetchecker_backend
        run: |
          dotnet ef migrations add "Migration_$(date +%Y%m%d%H%M%S)" \
            --project budgetchecker_backend.Infrastructure \
            --startup-project budgetchecker_backend \
            || echo "No changes detected, skipping migration"

      - name: Commit migration files
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add .
          git diff --staged --quiet || git commit -m "ci: auto migration"
          git push

  deploy:
    runs-on: ubuntu-latest
    needs: migration  # chờ migration job xong mới deploy

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/dev/budgetchecker
            git fetch origin main
            git reset --hard origin/main
            docker-compose -f infra/docker-compose.yml up -d --build